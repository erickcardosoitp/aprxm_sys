<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>APROXIMA — Gestão Comunitária</title>
    <script>
      (function(){
        var c=localStorage.getItem('aprxm-theme');
        if(!c)return;
        var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
        var root=document.documentElement;
        root.style.setProperty('--brand-header',c);
        root.style.setProperty('--brand-rgb',r+', '+g+', '+b);
      })()
    </script>
    <script>
      // Mock local do ESC (?mockesc=1) — TEMPORARIO, so testado em dev local.
      // Roda antes de qualquer modulo JS (inclusive antes do zustand persist
      // hidratar), escrevendo direto no localStorage (que o getItem custom do
      // authStore prioriza sobre sessionStorage) — assim vence qualquer sessao
      // real salva de teste anterior, sem corrida de timing.
      (function(){
        if (window.location.hostname !== 'localhost') return;
        if (!/[?&]mockesc=1\b/.test(window.location.search)) return;
        var FAKE_ID = '00000000-0000-0000-0000-000000000000';
        var payload = JSON.stringify({
          state: {
            token: 'mock-token', userId: 'mock-user-id', associationId: FAKE_ID,
            role: 'admin_master', fullName: 'ESC Demo', linkedAssociationIds: [],
            associationName: 'Escritório', rememberDevice: false, permissions: null,
            isOffice: false, empresaId: FAKE_ID, simplificaMode: false, simplificaEnabled: false
          },
          version: 0
        });
        localStorage.setItem('aprxm-auth', payload);
        sessionStorage.removeItem('aprxm-auth');
      })()
    </script>

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="APROXIMA" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
