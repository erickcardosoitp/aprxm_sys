name: Snyk Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Scan semanal: toda segunda às 07h (Brasília = UTC-3, 10h UTC)
    - cron: '0 10 * * 1'

jobs:
  snyk:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # para SARIF upload (GitHub Security tab)

    steps:
      - uses: actions/checkout@v4

      # ── Backend (Python) ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt --quiet

      - name: Snyk — backend Python
        uses: snyk/actions/python@master
        continue-on-error: true          # não bloqueia o deploy, apenas reporta
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-backend.sarif
          command: test
        working-directory: backend

      - name: Upload backend SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/snyk-backend.sarif
        continue-on-error: true

      # ── Frontend (Node/npm) ─────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Snyk — frontend npm
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-frontend.sarif
          command: test
        working-directory: frontend

      - name: Upload frontend SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: frontend/snyk-frontend.sarif
        continue-on-error: true

      # ── Monitor (registra no dashboard Snyk) ───────────────────────────
      - name: Snyk monitor — backend
        uses: snyk/actions/python@master
        if: github.ref == 'refs/heads/main'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --project-name=aprxm-backend
        working-directory: backend
        continue-on-error: true

      - name: Snyk monitor — frontend
        uses: snyk/actions/node@master
        if: github.ref == 'refs/heads/main'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --project-name=aprxm-frontend
        working-directory: frontend
        continue-on-error: true
